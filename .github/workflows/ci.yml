name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build C++ backend
      run: cmake --build build --config Release

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore NuGet packages
      run: dotnet restore src/WinUIShell/WinUIShell.csproj

    - name: Build WinUI Shell
      run: msbuild src/WinUIShell/WinUIShell.csproj /p:Configuration=Release /p:Platform=x64 /p:UseXamlCompilerExecutable=false /p:RestorePackages=false

    - name: Build Installer
      run: ISCC installer/CustomShell.iss
      continue-on-error: true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WinUIShell
        path: src/WinUIShell/bin/Release/net8.0-windows10.0.19041.0/win-x64/
